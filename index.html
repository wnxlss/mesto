<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESTO | NEW PLACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff1a1a;
            --primary-dark: #cc0000;
            --primary-light: #ff4d4d;
            --glass-bg: rgba(255, 26, 26, 0.15);
            --glass-border: rgba(255, 77, 77, 0.3);
            --shadow: 0 8px 32px rgba(255, 0, 0, 0.3);
            --glow: 0 0 20px rgba(255, 26, 26, 0.5);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            color: white;
        }

        /* Liquid Glass Background */
        .liquid-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .liquid-bg::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 0, 0, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(200, 0, 0, 0.3) 0%, transparent 50%);
            animation: liquidMove 20s infinite alternate;
            filter: blur(60px);
        }

        .liquid-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255, 0, 0, 0.05) 20px, rgba(255, 0, 0, 0.05) 40px);
            pointer-events: none;
        }

        @keyframes liquidMove {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(10deg); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 26, 26, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s infinite ease-in-out;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.2); }
        }

        /* Main Container */
        .glass-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--shadow), inset 0 0 30px rgba(255, 77, 77, 0.3);
            animation: containerGlow 3s infinite alternate;
            text-align: center;
        }

        @keyframes containerGlow {
            0% { box-shadow: var(--shadow), inset 0 0 30px rgba(255, 77, 77, 0.3); }
            100% { box-shadow: 0 8px 50px rgba(255, 0, 0, 0.6), inset 0 0 50px rgba(255, 77, 77, 0.5); }
        }

        /* Title */
        .title {
            font-size: clamp(3rem, 15vw, 5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: white;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            margin-bottom: 30px;
            animation: titlePulse 2s infinite alternate;
            position: relative;
            display: inline-block;
        }

        .title::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(15px);
            color: white;
            z-index: -1;
            opacity: 0.7;
        }

        @keyframes titlePulse {
            0% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary); }
            100% { text-shadow: 0 0 30px var(--primary-light), 0 0 60px var(--primary-light); }
        }

        /* Timer */
        .timer-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px 20px;
            margin: 40px 0;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .timer-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--primary), transparent 50%);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }

        .timer-wrapper::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .timer-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .timer-item {
            background: rgba(255, 26, 26, 0.2);
            border-radius: 15px;
            padding: 15px 10px;
            min-width: 80px;
            border: 1px solid rgba(255, 77, 77, 0.5);
            box-shadow: var(--glow);
            backdrop-filter: blur(5px);
            animation: itemFloat 2s infinite alternate;
        }

        .timer-item:nth-child(2) { animation-delay: 0.2s; }
        .timer-item:nth-child(3) { animation-delay: 0.4s; }
        .timer-item:nth-child(4) { animation-delay: 0.6s; }

        @keyframes itemFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        .timer-number {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 700;
            line-height: 1;
            color: white;
            text-shadow: 0 0 15px var(--primary);
        }

        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        /* Music Control */
        .music-control {
            margin: 30px 0;
        }

        .music-btn {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 30px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--glow);
        }

        .music-btn i {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .music-btn:hover {
            background: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--primary);
        }

        .music-btn:hover i {
            transform: scale(1.2);
        }

        .music-btn.playing {
            background: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .music-note {
            position: fixed;
            color: var(--primary);
            font-size: 1.5rem;
            pointer-events: none;
            animation: noteFloat 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes noteFloat {
            0% { 
                transform: translateY(0) rotate(0deg); 
                opacity: 1;
            }
            100% { 
                transform: translateY(-100px) rotate(20deg); 
                opacity: 0;
            }
        }

        /* Glass Elements */
        .glass-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px 20px;
            min-width: 120px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 26, 26, 0.2);
            border-color: var(--primary);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-light);
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Decorative Line */
        .glass-line {
            width: 150px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), var(--primary), transparent);
            margin: 20px auto;
            border-radius: 3px;
            animation: linePulse 2s infinite;
        }

        @keyframes linePulse {
            0%, 100% { opacity: 0.5; width: 100px; }
            50% { opacity: 1; width: 200px; }
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .footer i {
            color: var(--primary);
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-container {
                padding: 30px 15px;
            }
            
            .timer-item {
                min-width: 60px;
                padding: 10px 5px;
            }
            
            .stat-item {
                min-width: 100px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Liquid Glass Background -->
    <div class="liquid-bg"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Container -->
    <div class="glass-container">
        <h1 class="title" data-text="MESTO">MESTO</h1>
    
        <div class="glass-line"></div>

        <!-- Timer -->
        <div class="timer-wrapper">
            <div class="timer-title">До события осталось</div>
            <div class="timer" id="timer">
                <div class="timer-item">
                    <div class="timer-number" id="days">115</div>
                    <div class="timer-label">Дней</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="hours">00</div>
                    <div class="timer-label">Часов</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="minutes">00</div>
                    <div class="timer-label">Минут</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="seconds">00</div>
                    <div class="timer-label">Секунд</div>
                </div>
            </div>
        </div>

        <!-- Music Control -->
        <div class="music-control">
            <button class="music-btn" id="musicBtn">
                <i class="fas fa-play"></i>
                <span>Relaxing Music</span>
            </button>
        </div>

        <!-- Glass Stats -->
        <div class="glass-stats">
            <div class="stat-item">
                <div class="stat-value">115</div>
                <div class="stat-label">Дней</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">∞</div>
                <div class="stat-label">Энергии</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Релакс</div>
            </div>
        </div>

        <div class="glass-line"></div>

        <!-- Footer -->
        <div class="footer">
            <p>Made with MESTO <i class="fas fa-heart"></i></p>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="relaxMusic" loop preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=relaxing-music-121919.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Timer functionality
        function startTimer() {
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + 115);
            targetDate.setHours(0, 0, 0, 0);

            function updateTimer() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    document.getElementById('days').textContent = '0';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = days;
                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // Music control with animations
        const musicBtn = document.getElementById('musicBtn');
        const music = document.getElementById('relaxMusic');
        let isPlaying = false;

        function createMusicNote() {
            const note = document.createElement('i');
            note.className = 'fas fa-music music-note';
            note.style.left = Math.random() * 100 + '%';
            note.style.top = Math.random() * 100 + '%';
            note.style.animation = `noteFloat ${2 + Math.random() * 2}s ease-out forwards`;
            note.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
            document.body.appendChild(note);
            
            setTimeout(() => {
                note.remove();
            }, 3000);
        }

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                music.pause();
                musicBtn.classList.remove('playing');
                musicBtn.innerHTML = '<i class="fas fa-play"></i><span>Relaxing Music</span>';
            } else {
                music.play().catch(e => console.log('Audio play failed:', e));
                musicBtn.classList.add('playing');
                musicBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause Music</span>';
                
                // Create floating music notes
                for (let i = 0; i < 5; i++) {
                    setTimeout(createMusicNote, i * 200);
                }
            }
            isPlaying = !isPlaying;
        });

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 15 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 3) + 's';
                
                particlesContainer.appendChild(particle);
            }
        }

        // Mouse move parallax effect
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.glass-container');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            container.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg) translateZ(20px)`;
        });

        // Reset transform on mouse leave
        document.addEventListener('mouseleave', () => {
            const container = document.querySelector('.glass-container');
            container.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateZ(0)';
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            startTimer();
            createParticles();
        });
    </script>
</body>
</html>
